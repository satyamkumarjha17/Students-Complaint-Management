services:
  - type: web
    name: student-complaints-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: DATABASE_URL
        fromDatabase:
          name: complaints-db
          property: connectionString

  - type: psql
    name: complaints-db
    plan: free
    databaseName: complaints_db
    user: postgres
